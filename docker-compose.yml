# ─────────────────────────────────────────────────────────────
#  docker-compose.yml
#  ─────────────────────────────────────────────────────────────
#  O QUE É: Orquestrador de containers multi-serviço.
#  COMO FUNCIONA: Define serviços, redes e volumes. O Compose
#    cria uma rede interna onde os containers se enxergam
#    pelos nomes dos serviços (ex: "sqlserver", "redis").
#
#  COMANDOS ÚTEIS:
#    docker compose up -d        → Sobe todos os serviços em background
#    docker compose down         → Para e remove os containers
#    docker compose down -v      → Para e remove os containers + volumes (DADOS SÃO PERDIDOS)
#    docker compose logs -f      → Acompanha logs de todos os serviços
#    docker compose ps           → Mostra status dos serviços
# ─────────────────────────────────────────────────────────────

services:

  # ── SQL Server 2022 ───────────────────────────────────────
  # Imagem oficial da Microsoft rodando SQL Server em Linux.
  # Porta padrão: 1433 (TCP).
  # Dados persistem em volume named → sobrevivem a restart.
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: firstwebapi-sqlserver
    environment:
      - ACCEPT_EULA=Y             # Aceita os termos de licença da Microsoft
      - SA_PASSWORD=${SA_PASSWORD} # Senha do usuário sa (vem do .env)
      - MSSQL_PID=Developer       # Edição gratuita para desenvolvimento
    ports:
      - "1433:1433"               # Porta padrão SQL Server
    volumes:
      - sqlserver_data:/var/opt/mssql  # Volume named: persiste dados do banco
    restart: unless-stopped       # Reinicia automaticamente se parar

  # ── LocalStack (AWS Local) ────────────────────────────────
  # Emulador de serviços AWS que roda localmente.
  # Útil para desenvolvimento sem gastar $$ com AWS real.
  # Endpoint unificado: http://localhost:4566
  # A partir da v4, exige um Auth Token (gratuito via Personal Tier).
  # Obtenha em: https://app.localstack.cloud/
  # Usamos a imagem Pro (localstack-pro) por ser a oficial a partir da v4
  # com Auth Token. Serviços: KMS + Lambda.
  localstack:
    image: localstack/localstack-pro
    container_name: firstwebapi-localstack
    ports:
      - "14566:4566"              # Gateway único LocalStack (porta alternativa)
    environment:
      - SERVICES=kms,lambda       # Habilita apenas KMS e Lambda (economiza RAM)
      - AWS_DEFAULT_REGION=us-east-1
      - PERSISTENCE=1             # Salva estado em disco (chaves KMS persistem)
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:?}  # Token de autenticação (obrigatório)
    volumes:
      - localstack_data:/var/lib/localstack  # Volume named: persiste estado
      - /var/run/docker.sock:/var/run/docker.sock  # Necessário para Lambda criar containers
    restart: unless-stopped

  # ── WebAPI (.NET 10) ──────────────────────────────────────
  # Nossa aplicação principal.
  # O Dockerfile (na raiz) define como construir esta imagem.
  # Depende dos serviços acima, mas o depends_on só garante
  #   ordem de inicialização, NÃO que o serviço está "pronto".
  #   Por isso, a API tem retry logic no código.
  webapi:
    build:
      context: .                  # Usa o Dockerfile na raiz
      dockerfile: Dockerfile
    container_name: firstwebapi-api
    ports:
      - "5000:8080"               # HTTP: host:5000 → container:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
      - Kms__Endpoint=http://localstack:4566
      - Kms__UseHttp=true
      - Kms__KeyId=alias/firstwebapi-key
      - Kms__Region=us-east-1
      - Kms__AccessKey=fake
      - Kms__SecretKey=fake
      - Jwt__SecretKey=${JWT_SECRET_KEY:?}
    depends_on:
      - sqlserver
      - localstack
    restart: unless-stopped

# ── Volumes Named ───────────────────────────────────────────
# Volumes gerenciados pelo Docker. Diferente de bind mounts,
#   os arquivos ficam em área gerenciada pelo Docker, não
#   no sistema de arquivos do host diretamente.
# VANTAGEM: Isolamento, performance, portabilidade.
# Comando para inspecionar: docker volume ls / docker volume inspect <nome>
volumes:
  sqlserver_data:     # Armazena arquivos .mdf/.ldf do SQL Server
  localstack_data:    # Armazena estado do LocalStack (chaves KMS)
