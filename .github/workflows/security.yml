name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'  # toda segunda 06:00 UTC
  push:
    branches: [develop, main]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'

      - name: Auditoria de vulnerabilidades
        run: dotnet list package --vulnerable --include-transitive 2>&1
