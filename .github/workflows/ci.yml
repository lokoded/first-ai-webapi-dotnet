name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
          MSSQL_PID: Developer
        ports:
          - 1433:1433

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: --entrypoint "redis-server"
        cmd: --requirepass "RedisP@ss123"

      localstack:
        image: localstack/localstack:4.0
        env:
          SERVICES: kms
          AWS_DEFAULT_REGION: us-east-1
        ports:
          - 4566:4566

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Testes Unitários
        run: dotnet test tests/FirstWebApi.UnitTests --no-restore --configuration Release --settings coverlet.runsettings --verbosity normal

      - name: Testes de Integração
        run: dotnet test tests/FirstWebApi.IntegrationTests --no-restore --configuration Release --settings coverlet.runsettings --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.CONNECTION_STRING_TEST }}
          ConnectionStrings__Redis: ${{ secrets.REDIS_CONNECTION }}
          Kms__Endpoint: ${{ secrets.KMS_ENDPOINT }}
          Kms__UseHttp: true
          Kms__KeyId: ${{ secrets.KMS_KEY_ID }}
          Kms__Region: us-east-1
          Kms__AccessKey: fake
          Kms__SecretKey: fake
          ASPNETCORE_ENVIRONMENT: Testing
