name: CI

on:
  push:
    branches: [develop, main, feature/*, fix/*]
  pull_request:
    branches: [develop, main]

env:
  DOTNET_VERSION: '10.0.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
          MSSQL_PID: Developer
        ports:
          - 1433:1433

      localstack:
        image: localstack/localstack:4.0
        env:
          SERVICES: kms
          AWS_DEFAULT_REGION: us-east-1
        ports:
          - 4566:4566

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test tests/FirstWebApi.UnitTests --no-restore --configuration Release --settings coverlet.runsettings --verbosity normal

      - name: Integration Tests
        run: dotnet test tests/FirstWebApi.IntegrationTests --no-restore --configuration Release --settings coverlet.runsettings --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.CONNECTION_STRING_TEST }}
          Kms__Endpoint: ${{ secrets.KMS_ENDPOINT }}
          Kms__UseHttp: true
          Kms__KeyId: ${{ secrets.KMS_KEY_ID }}
          Kms__Region: us-east-1
          Kms__AccessKey: fake
          Kms__SecretKey: fake
          ASPNETCORE_ENVIRONMENT: Testing

      - name: Vulnerability Scan
        run: dotnet list package --vulnerable --include-transitive 2>&1

      - name: Check Coverage Threshold
        shell: pwsh
        run: |
          $threshold = 70
          $exceptions = @{ "FirstWebApi.Application" = 60 }
          $projectMaxCov = @{}
          $projectSources = @{}
          Get-ChildItem -Recurse -Filter "coverage.cobertura.xml" | ForEach-Object {
            $source = if ($_.FullName -match "IntegrationTests") { "Integration" } else { "Unit" }
            $xml = [xml](Get-Content $_.FullName)
            $overall = [double]($xml.coverage."line-rate") * 100
            Write-Host "## $source Tests Coverage"
            Write-Host "Geral: $([math]::Round($overall, 1))%"
            foreach ($pkg in $xml.coverage.packages.package) {
              $name = $pkg.name
              $cov = [double]($pkg."line-rate") * 100
              if (-not $projectMaxCov.ContainsKey($name) -or $cov -gt $projectMaxCov[$name]) {
                $projectMaxCov[$name] = $cov
                $projectSources[$name] = @($source)
              } elseif ($cov -eq $projectMaxCov[$name]) {
                $projectSources[$name] += $source
              }
              $min = if ($exceptions.ContainsKey($name)) { $exceptions[$name] } else { $threshold }
              if ($cov -lt $min) {
                Write-Host "  $name`: $([math]::Round($cov, 1))% (ATENCAO: abaixo de $min%)"
              } else {
                Write-Host "  $name`: $([math]::Round($cov, 1))% (OK)"
              }
            }
          }
          Write-Host ""
          Write-Host "## Resumo por Projeto (melhor cobertura)"
          $failures = @()
          foreach ($name in $projectMaxCov.Keys | Sort-Object) {
            $cov = $projectMaxCov[$name]
            $sources = $projectSources[$name] -join ", "
            $min = if ($exceptions.ContainsKey($name)) { $exceptions[$name] } else { $threshold }
            if ($cov -lt $min) {
              Write-Host "::warning::$name $([math]::Round($cov, 1))% ($sources) abaixo do minimo $min% (target: $threshold%)"
              $failures += "$name ($([math]::Round($cov, 1))% em $sources)"
            } else {
              Write-Host "  $name`: $([math]::Round($cov, 1))% ($sources) (OK)"
            }
          }
          if ($failures.Count -gt 0) {
            throw "Projetos abaixo do threshold minimo: $($failures -join ', ')"
          }
          Write-Host "Todos os projetos atendem o threshold de cobertura"

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: tests/**/TestResults/**/coverage.cobertura.xml
          retention-days: 30
